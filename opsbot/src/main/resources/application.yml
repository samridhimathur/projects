spring:
  application:
    name: opsbot

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/opsbot}
    username: ${SPRING_DATASOURCE_USERNAME:opsbot}
    password: ${SPRING_DATASOURCE_PASSWORD:opsbot_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # never let Hibernate touch schema in prod; init.sql owns it
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false               # flip to true for local debugging

  # Jackson: serialize enums as strings, not ordinal ints
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-message: always       # surface error messages in dev; lock down in prod

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY}
    base-url: https://api.anthropic.com
    model: claude-sonnet-4-20250514
    max-tokens: 2048

cohere:
  api:
    key: ${COHERE_API_KEY}
    base-url: https://api.cohere.com
    model: embed-english-v3.0

# Kafka configuration for event streaming
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all  # wait for all replicas to acknowledge
      retries: 3
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: ${KAFKA_GROUP_ID:opsbot-event-processor}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
      auto-offset-reset: earliest
      enable-auto-commit: true

  # Topics
application:
  kafka:
    topics:
      alerts: opsbot-alerts
      deadletter: opsbot-alerts-dlq
  level:
    com.opsbot: DEBUG
    org.springframework.web: INFO
    org.springframework.boot.context.properties: TRACE

management:
  endpoints:
    web:
      exposure:
        include: env, health
